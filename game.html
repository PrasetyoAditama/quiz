<!DOCTYPE html>
<html>
    <head>
        <title>Quiz | Playing</title> 
        <link rel="stylesheet" href="assets/stylesheets/styles.css"/>
        <link rel="icon" href="assets/images/favicon.ico?v=2.0"/>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body id="gameBody">
        <main class="transparentBox">
            <div id="topBar">
                <div id="topBar-item">
                    <p class="semiBold">Waktu Tersisa</p>
                    <p id="timer" class="big semiBold"></p>
                </div>
                <div id="topBar-divider"></div>
                <div id="topBar-item">
                    <p class="semiBold">Pertanyaan</p>
                    <p class="big semiBold"><span id="questionNum">1</span>/10</p>
                </div>
                <div id="topBar-divider"></div>
                <div id="topBar-item">
                    <p class="semiBold">Skor</p>
                    <p id="scoreNum" class="big semiBold">0</p>
                </div>
            </div>
            <div class="center-box">
                <h2 id="vprasanje">Jika Anda tidak melihat pertanyaan, tunggu setidaknya 5 detik dan kemudian segarkan halaman ini.</h2>
                <div id="odgovor">
                    <ul id="answerList"></ul>
                </div>
                <div id="newBox" class="whiteTransBox">
                    <div id="messageBox">
                        <p id="noTimeLeft" style="display: none;">Waktu habis! Semoga anda bisa lebih cepat lain kali!</p>
                        <p id="message"></p>
                    </div>
                    <button id="mainButton" class="button big semiBold"></button>
                </div>
            </div>

            </div>
        </main>
        
        <script src="assets/scripts/layout.js"></script>
        <script src="questions/questions.js"></script>
        <script src="assets/scripts/global.js"></script>
        <script src="assets/scripts/mainButton.js"></script>
        <script src="assets/scripts/answerDisplay.js"></script>
        <script src="assets/scripts/timer.js"></script>
        <script src="assets/scripts/questionHandling.js"></script>
        <script> window.onload = () => { getQuestions(); startTimer(); }; </script>
        </body>
</html>
