<!DOCTYPE html>
<html>
    <head>
        <title>Quiz | Play now!</title> 
        <link rel="stylesheet" href="assets/stylesheets/styles.css"/>
        <link rel="icon" href="assets/images/favicon.ico?v=2.0"/>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>

    <body class="index-body">
        <main class="index-center">
            <center><h1>Uji pengetahuan anda mengenai pelestarian lingkungan !</h1></center>
            <div class="card">
                <div id="setupForm">
                    <label for="playerName">Nama Anda</label>
                    <input type="text" id="playerName" placeholder="Masukkan nama Anda" maxlength="20" autocomplete="off" oninput="document.getElementById('nameError').style.display='none'"/>
                    <p id="nameError" style="display:none; color: var(--red); font-size: 13px; font-weight: 600;">Tolong masukkan nama Anda sebelum melanjutkan.</p>
                    <label for="difficulty">Kesulitan</label>
                    <select id="difficulty">
                        <option value="easy">Mudah - 60 Detik</option>
                        <option value="medium" selected>Sedang — 45 Detik</option>
                        <option value="hard">Sulit — 30 Detik</option>
                    </select>
                </div>
            </div>
            <button class="button" onclick="startGame()">Mulai 🍃</button>
            <a href="https://terradomino.netlify.app/" target="_blank" id="terra-link">🌍 Kunjungi TerraBhinneka Domino Iklim</a>
        </main>
        <script src="assets/scripts/layout.js"></script>
        <script>
                function startGame(){
                    const name = document.getElementById('playerName').value.trim();
                    const diff = document.getElementById('difficulty').value;
                    if(!name){
                        document.getElementById('playerName').focus();
                        document.getElementById('nameError').style.display = 'block';
                        return;
                    }
                    window.location.href = `game.html?difficulty=${diff}&name=${encodeURIComponent(name)}`;
                }
            </script>
        </main>

    </body>
</html>
