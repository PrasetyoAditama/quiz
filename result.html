<!DOCTYPE html>
<html>
    <head>
        <title>Quiz | Result</title> 
        <link rel="stylesheet" href="assets/stylesheets/styles.css"/>
        <link rel="icon" href="assets/images/favicon.ico?v=2.0"/>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <div class="transparentBox resultCenter">

            <main class="center-box index-center">
                <h1>Permainan Selesai!</h1>
                <div class="whiteTransBox resultBox card">
                    <p id="playerName"></p>
                    <p id="scoreText">Skor Anda</p>
                    <h1 id="scoreNum">0</h1>
                    <p id="timeTaken"></p>
                </div>
                <a href="index.html" class="button big semiBold">Main lagi?</a>
            </main>
        </div>

        <script src="assets/scripts/layout.js"></script>
        <script src="assets/scripts/jsonbin.js"></script>
        <script>
            const urlParams = new URLSearchParams(window.location.search);
            const score = urlParams.get('score');
            const name = urlParams.get('name');
            const elapsed = parseInt(urlParams.get('elapsed'));
            const difficulty = urlParams.get('difficulty') || 'medium';

            document.getElementById("scoreNum").innerHTML = score;
            if(name) document.getElementById("playerName").innerHTML = name;
            if(elapsed) {
                const m = Math.floor(elapsed / 60), s = elapsed % 60;
                document.getElementById("timeTaken").innerHTML = `Diselesaikan dalam ${m > 0 ? m + 'm ' : ''}${s}d`;
            }

            if(name && score) {
                saveEntry({ name, score: parseInt(score), elapsed, difficulty });
            }
        </script>
    </body>
</html>
